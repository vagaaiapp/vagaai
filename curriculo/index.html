<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VagaAI — Meu Currículo</title>
<meta name="description" content="Gerencie seus currículos salvos, defina o currículo padrão e receba um Raio-X completo do seu perfil profissional.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<!-- Vercel Analytics -->
<script defer src="/_vercel/insights/script.js"></script>
<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f0d;
  --surface:#111814;
  --surface2:#161d19;
  --border:rgba(255,255,255,0.07);
  --text:#e8ede9;
  --muted:#8a9e90;
  --green:#3ecf8e;
  --green-dim:rgba(62,207,142,0.12);
  --green-border:rgba(62,207,142,0.25);
  --red:#ff6b6b;
  --red-dim:rgba(255,107,107,0.12);
  --yellow:#ffd166;
  --yellow-dim:rgba(255,209,102,0.12);
}
[data-theme="light"]{--bg:#f2f6f3;--surface:#ffffff;--surface2:#eaf0ec;--border:rgba(0,0,0,0.09);--text:#0d1a11;--muted:#4d6e57;--green:#1a8f5c;--green-dim:rgba(26,143,92,0.1);--green-border:rgba(26,143,92,0.25);--red:#c0392b;--red-dim:rgba(192,57,43,0.08);--yellow:#b07d1a;--yellow-dim:rgba(176,125,26,0.08)}
body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:2.5rem 1.5rem 4rem}
.page-title{font-family:'Lora',serif;font-size:clamp(24px,4vw,36px);font-weight:700;line-height:1.15;margin-bottom:.4rem}
.page-sub{color:var(--muted);font-size:14px;margin-bottom:2rem;max-width:640px}

.top-actions{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:2rem}
.btn{display:inline-flex;align-items:center;gap:.45rem;font-family:'Manrope',sans-serif;font-size:13.5px;font-weight:700;padding:.65rem 1.1rem;border-radius:10px;border:1px solid transparent;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--green);color:#06130b;border-color:var(--green)}
.btn-primary:hover{filter:brightness(1.08)}
.btn-ghost{background:var(--surface);color:var(--text);border-color:var(--border)}
.btn-ghost:hover{border-color:var(--green-border);color:var(--green)}
.btn[disabled]{opacity:.55;cursor:not-allowed}

/* CARDS */
.cv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.cv-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.2rem;display:flex;flex-direction:column;gap:.7rem;transition:border-color .2s}
.cv-card:hover{border-color:var(--green-border)}
.cv-card.is-default{border-color:var(--green-border);box-shadow:0 0 0 1px var(--green-border)}
.cv-card-head{display:flex;align-items:flex-start;gap:.6rem}
.cv-card-ic{width:38px;height:38px;flex-shrink:0;border-radius:10px;background:var(--green-dim);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center;color:var(--green)}
.cv-card-name{font-weight:800;font-size:15px;line-height:1.3;word-break:break-word}
.cv-card-meta{font-size:11.5px;color:var(--muted);margin-top:2px}
.cv-badges{display:flex;gap:.4rem;flex-wrap:wrap}
.badge{font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.badge-default{background:var(--green-dim);border:1px solid var(--green-border);color:var(--green)}
.badge-tpl{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.badge-xray{background:var(--yellow-dim);border:1px solid var(--yellow);color:var(--yellow)}
.cv-card-actions{display:flex;gap:.45rem;flex-wrap:wrap;margin-top:auto;padding-top:.5rem}
.card-btn{font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;padding:.42rem .75rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:all .2s}
.card-btn:hover{border-color:var(--green-border);color:var(--green)}
.card-btn.primary{background:var(--green-dim);border-color:var(--green-border);color:var(--green)}
.card-btn.danger:hover{border-color:var(--red);color:var(--red)}

/* EMPTY STATE */
.empty{background:var(--surface);border:1px dashed var(--green-border);border-radius:16px;padding:3rem 1.5rem;text-align:center;max-width:560px;margin:2rem auto}
.empty h2{font-family:'Lora',serif;font-size:21px;margin-bottom:.5rem}
.empty p{color:var(--muted);font-size:14px;margin-bottom:1.4rem}
.empty .btns{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap}

/* MODAL (Raio-X) */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:2rem 1rem;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:680px;width:100%;padding:1.8rem;position:relative}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;line-height:1}
.modal-close:hover{color:var(--text)}
.xr-title{font-family:'Lora',serif;font-size:22px;margin-bottom:.2rem}
.xr-sub{font-size:12.5px;color:var(--muted);margin-bottom:1.2rem}
.xr-sec{margin-bottom:1.2rem}
.xr-sec h3{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--green);margin-bottom:.5rem}
.xr-sec p{font-size:14px}
.chips{display:flex;gap:.4rem;flex-wrap:wrap}
.chip{font-size:12px;font-weight:600;background:var(--surface2);border:1px solid var(--border);padding:.25rem .7rem;border-radius:20px}
.chip.gr{background:var(--green-dim);border-color:var(--green-border);color:var(--green)}
.xr-list{list-style:none}
.xr-list li{font-size:13.5px;padding:.3rem 0 .3rem 1.3rem;position:relative}
.xr-list li::before{content:'';position:absolute;left:0;top:.72em;width:7px;height:7px;border-radius:50%;background:var(--green)}
.xr-list.gaps li::before{background:var(--yellow)}
.xr-grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
@media(max-width:640px){.xr-grid2{grid-template-columns:1fr}}
.xr-badge-sen{display:inline-block;font-size:12px;font-weight:800;text-transform:capitalize;background:var(--green-dim);border:1px solid var(--green-border);color:var(--green);padding:.3rem .9rem;border-radius:20px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--green-border);color:var(--text);padding:.7rem 1.2rem;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:all .3s;z-index:300;max-width:90vw;text-align:center}
.toast.vis{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red)}

/* AUTH GATE */
.gate{max-width:440px;margin:4rem auto;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem 1.8rem;text-align:center}
.gate h2{font-family:'Lora',serif;font-size:20px;margin-bottom:.5rem}
.gate p{color:var(--muted);font-size:14px;margin-bottom:1.3rem}

/* LOADING */
.loading{text-align:center;padding:4rem 0;color:var(--muted);font-size:14px}
.spinner{display:inline-block;width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
  <h1 class="page-title">Meu Currículo</h1>
  <p class="page-sub">Seus currículos salvos em um só lugar. Defina um padrão para usar direto nas análises de vaga e gere o Raio-X completo do seu perfil profissional.</p>

  <div id="mainArea">
    <div class="loading" id="loadingBox"><span class="spinner"></span>Carregando seus currículos...</div>
  </div>

  <input type="file" id="uploadInput" accept=".txt,.pdf,.doc,.docx" style="display:none" onchange="handleUploadFile(this)">
</div>

<!-- Modal Raio-X -->
<div class="modal-bg" id="xrModal" onclick="if(event.target===this)closeXr()">
  <div class="modal">
    <button class="modal-close" onclick="closeXr()" aria-label="Fechar">✕</button>
    <div id="xrContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL = 'https://kbcjchjepgejdezeuwwh.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtiY2pjaGplcGdlamRlemV1d3doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzA4OTcsImV4cCI6MjA5MjM0Njg5N30.k2julxPkEm4kgtw5dBy6S8hlSrVBqebe-A_GfzcW2HA';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ── Tema (mesma chave dos módulos do painel) ── */
(function(){
  var saved = null;
  try { saved = localStorage.getItem('vagaai_theme'); } catch(e){}
  if (saved === 'dark' || saved === 'light') document.documentElement.setAttribute('data-theme', saved);
})();

var _isEmbedded = window.self !== window.top || new URLSearchParams(location.search).get('embedded') === '1';

var _session = null;
var _cvs = [];
var _busy = false;

function toast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('vis');
  clearTimeout(t._tm);
  t._tm = setTimeout(function(){ t.classList.remove('vis'); }, 3200);
}

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function goTo(href) {
  // Dentro do painel, pede pro shell navegar (mantém sidebar/histórico corretos)
  if (_isEmbedded && window.parent !== window) {
    try { window.parent.postMessage({ type: 'vagaai-nav', frame: true, href: href, id: href.indexOf('/cv') === 0 ? 'curriculo' : 'curriculo' }, '*'); return; } catch(e){}
  }
  location.href = href;
}

/* ── Init ── */
(async function init(){
  var s = await sb.auth.getSession();
  _session = s && s.data && s.data.session;
  if (!_session) {
    document.getElementById('mainArea').innerHTML =
      '<div class="gate"><h2>Entre para acessar seus currículos</h2>' +
      '<p>Seus currículos ficam salvos na nuvem, prontos para usar em qualquer análise de vaga.</p>' +
      '<a class="btn btn-primary" href="/login">Entrar na minha conta</a></div>';
    return;
  }
  await loadCvs();
})();

async function loadCvs() {
  var r = await sb.from('cv_saves')
    .select('id,name,template,updated_at,is_default,profile_analysis,profile_analysis_at')
    .eq('user_id', _session.user.id)
    .order('is_default', { ascending: false })
    .order('updated_at', { ascending: false });
  _cvs = (r && r.data) || [];
  render();
}

function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' }); } catch(e){ return ''; }
}

var TPL_LABELS = { classic:'Clássico', modern:'Moderno', exec:'Executivo', compact:'Compacto', minimal:'Minimalista', focus:'Focus', upload:'Enviado' };

function render() {
  var area = document.getElementById('mainArea');
  if (!_cvs.length) {
    area.innerHTML =
      '<div class="empty"><h2>Você ainda não tem currículos salvos</h2>' +
      '<p>Crie um currículo profissional do zero com ajuda da IA, ou envie o que você já tem — ele fica salvo e pronto para otimizar em qualquer vaga.</p>' +
      '<div class="btns">' +
      '<button class="btn btn-primary" onclick="goTo(\'/cv\')">Criar currículo do zero</button>' +
      '<button class="btn btn-ghost" onclick="document.getElementById(\'uploadInput\').click()">Enviar meu currículo</button>' +
      '</div></div>';
    return;
  }
  var DOC_IC = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>';
  var html = '<div class="top-actions">' +
    '<button class="btn btn-primary" onclick="goTo(\'/cv\')">+ Criar do zero</button>' +
    '<button class="btn btn-ghost" onclick="document.getElementById(\'uploadInput\').click()">Enviar currículo pronto</button>' +
    '</div><div class="cv-grid">';
  _cvs.forEach(function(cv){
    var badges = '';
    if (cv.is_default) badges += '<span class="badge badge-default">Padrão</span>';
    badges += '<span class="badge badge-tpl">' + esc(TPL_LABELS[cv.template] || cv.template || 'CV') + '</span>';
    if (cv.profile_analysis) badges += '<span class="badge badge-xray">Raio-X pronto</span>';
    var actions = '';
    actions += '<button class="card-btn primary" onclick="openXr(\'' + cv.id + '\')">' + (cv.profile_analysis ? 'Ver Raio-X' : 'Gerar Raio-X') + '</button>';
    if (!cv.is_default) actions += '<button class="card-btn" onclick="setDefault(\'' + cv.id + '\')">Definir padrão</button>';
    if (cv.template !== 'upload') actions += '<button class="card-btn" onclick="goTo(\'/cv\')">Editar</button>';
    actions += '<button class="card-btn" onclick="renameCv(\'' + cv.id + '\')">Renomear</button>';
    actions += '<button class="card-btn danger" onclick="deleteCv(\'' + cv.id + '\')">Excluir</button>';
    html += '<div class="cv-card' + (cv.is_default ? ' is-default' : '') + '">' +
      '<div class="cv-card-head"><div class="cv-card-ic">' + DOC_IC + '</div><div>' +
      '<div class="cv-card-name">' + esc(cv.name || 'Currículo') + '</div>' +
      '<div class="cv-card-meta">Atualizado em ' + fmtDate(cv.updated_at) + '</div>' +
      '</div></div>' +
      '<div class="cv-badges">' + badges + '</div>' +
      '<div class="cv-card-actions">' + actions + '</div></div>';
  });
  html += '</div>';
  area.innerHTML = html;
}

/* ── Ações dos cards ── */
async function setDefault(id) {
  if (_busy) return; _busy = true;
  try {
    // limpa o padrão anterior antes de setar o novo (índice único garante 1 por usuário)
    await sb.from('cv_saves').update({ is_default: false }).eq('user_id', _session.user.id).eq('is_default', true);
    var r = await sb.from('cv_saves').update({ is_default: true }).eq('id', id).eq('user_id', _session.user.id);
    if (r.error) throw r.error;
    toast('✓ Currículo definido como padrão');
    await loadCvs();
  } catch(e) { toast('Erro ao definir padrão: ' + (e.message || e), true); }
  _busy = false;
}

async function renameCv(id) {
  var cv = _cvs.find(function(c){ return c.id === id; });
  var name = prompt('Novo nome do currículo:', (cv && cv.name) || 'Currículo');
  if (!name || !name.trim()) return;
  var r = await sb.from('cv_saves').update({ name: name.trim().slice(0, 80) }).eq('id', id).eq('user_id', _session.user.id);
  if (r.error) { toast('Erro ao renomear: ' + r.error.message, true); return; }
  toast('✓ Renomeado');
  await loadCvs();
}

async function deleteCv(id) {
  var cv = _cvs.find(function(c){ return c.id === id; });
  if (!confirm('Excluir "' + ((cv && cv.name) || 'Currículo') + '"? Essa ação não pode ser desfeita.')) return;
  var r = await sb.from('cv_saves').delete().eq('id', id).eq('user_id', _session.user.id);
  if (r.error) { toast('Erro ao excluir: ' + r.error.message, true); return; }
  toast('Currículo excluído');
  await loadCvs();
}

/* ── Upload de currículo pronto ── */
async function loadScript(src) {
  return new Promise(function(resolve, reject){
    var s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function extractPdfText(file) {
  if (!window.pdfjsLib) {
    await loadScript('https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js');
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
  }
  var ab = await file.arrayBuffer();
  var pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  var out = [];
  for (var i = 1; i <= pdf.numPages; i++) {
    var page = await pdf.getPage(i);
    var tc = await page.getTextContent();
    out.push(tc.items.map(function(it){ return it.str; }).join(' '));
  }
  return out.join('\n\n');
}

async function handleUploadFile(input) {
  var file = input.files && input.files[0];
  input.value = '';
  if (!file) return;
  if (file.size > 8 * 1024 * 1024) { toast('Arquivo muito grande (máx. 8MB).', true); return; }
  toast('Lendo arquivo...');
  var text = '';
  try {
    var ext = (file.name.split('.').pop() || '').toLowerCase();
    if (ext === 'pdf') {
      text = await extractPdfText(file);
    } else if (ext === 'doc' || ext === 'docx') {
      if (!window.mammoth) await loadScript('https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js');
      var result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
      text = result.value || '';
    } else {
      text = await file.text();
    }
  } catch(e) {
    toast('Não foi possível ler o arquivo. Tente PDF, Word ou TXT.', true);
    return;
  }
  text = (text || '').trim();
  if (text.length < 120) { toast('Não encontramos texto suficiente no arquivo. Verifique se o currículo não é uma imagem escaneada.', true); return; }

  var baseName = file.name.replace(/\.[^.]+$/, '').slice(0, 60) || 'Meu currículo';
  var payload = {
    user_id: _session.user.id,
    name: baseName,
    cv_data: { raw_text: text.slice(0, 30000) },
    template: 'upload',
    is_default: _cvs.length === 0, // primeiro currículo já vira o padrão
    updated_at: new Date().toISOString()
  };
  var r = await sb.from('cv_saves').insert([payload]);
  if (r.error) { toast('Erro ao salvar: ' + r.error.message, true); return; }
  toast('✓ Currículo salvo! Agora você pode usá-lo nas análises.');
  await loadCvs();
}

/* ── Conversor cv_data → texto (estruturado do criador OU raw_text de upload) ── */
function cvToText(d) {
  if (!d) return '';
  if (typeof d === 'string') return d;
  if (d.raw_text) return String(d.raw_text);
  var L = [];
  if (d.nome) L.push(d.nome);
  if (d.titulo_profissional) L.push(d.titulo_profissional);
  var c = d.contato || {};
  var ct = [c.email, c.telefone, c.linkedin, c.cidade].filter(Boolean).join(' | ');
  if (ct) L.push(ct);
  if (d.resumo_profissional) { L.push(''); L.push('RESUMO PROFISSIONAL'); L.push(d.resumo_profissional); }
  var exps = d.experiencias || [];
  if (exps.length) {
    L.push(''); L.push('EXPERIÊNCIA PROFISSIONAL');
    exps.forEach(function(e){
      L.push([e.cargo, e.empresa].filter(Boolean).join(' — ') + (e.periodo ? ' (' + e.periodo + ')' : ''));
      (e.bullets || []).forEach(function(b){ L.push('- ' + b); });
    });
  }
  var edu = d.formacao || [];
  if (edu.length) {
    L.push(''); L.push('FORMAÇÃO ACADÊMICA');
    edu.forEach(function(e){ L.push([e.curso, e.instituicao].filter(Boolean).join(' — ') + (e.periodo ? ' (' + e.periodo + ')' : '')); });
  }
  var sk = d.habilidades || [];
  if (sk.length) { L.push(''); L.push('HABILIDADES'); L.push(sk.map(function(s){ return typeof s === 'string' ? s : (s && s.nome) || ''; }).filter(Boolean).join(', ')); }
  return L.join('\n');
}

/* ── Raio-X ── */
async function openXr(id) {
  var cv = _cvs.find(function(c){ return c.id === id; });
  if (!cv) return;
  if (cv.profile_analysis) { renderXr(cv, cv.profile_analysis); return; }
  await generateXr(id);
}

async function generateXr(id) {
  if (_busy) return; _busy = true;
  var modal = document.getElementById('xrModal');
  var box = document.getElementById('xrContent');
  modal.classList.add('open');
  box.innerHTML = '<div class="loading" style="padding:2.5rem 0"><span class="spinner"></span>Analisando seu perfil... isso leva alguns segundos.</div>';
  try {
    // busca o cv_data completo só agora (a listagem não traz o conteúdo)
    var full = await sb.from('cv_saves').select('cv_data').eq('id', id).eq('user_id', _session.user.id).single();
    var text = cvToText(full.data && full.data.cv_data);
    if (text.length < 120) { box.innerHTML = xrError('Este currículo tem pouco conteúdo para análise. Complete-o no criador primeiro.'); _busy = false; return; }

    var fresh = await sb.auth.getSession();
    var token = fresh && fresh.data && fresh.data.session && fresh.data.session.access_token;
    var res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ action: 'profile_cv', cv: text.slice(0, 20000) })
    });
    var data = null;
    try { data = await res.json(); } catch(e){}
    if (res.status === 402) { box.innerHTML = xrError('Você não tem créditos disponíveis. O Raio-X consome 1 crédito, como uma análise de vaga.', '/dashboard#plano', 'Ver planos e créditos'); _busy = false; return; }
    if (!res.ok || !data || !data.profile) { box.innerHTML = xrError((data && (data.message || data.error)) || 'Erro ao gerar a análise. Tente novamente.'); _busy = false; return; }

    // salva no próprio registro (RLS: só o dono consegue)
    var now = new Date().toISOString();
    await sb.from('cv_saves').update({ profile_analysis: data.profile, profile_analysis_at: now }).eq('id', id).eq('user_id', _session.user.id);
    var cv = _cvs.find(function(c){ return c.id === id; });
    if (cv) { cv.profile_analysis = data.profile; cv.profile_analysis_at = now; }
    renderXr(cv || { name: 'Currículo', profile_analysis_at: now }, data.profile);
    render(); // atualiza badges na grade
  } catch(e) {
    box.innerHTML = xrError('Erro inesperado: ' + (e.message || e));
  }
  _busy = false;
}

function xrError(msg, linkHref, linkLabel) {
  return '<div style="text-align:center;padding:1.5rem 0"><p style="color:var(--red);font-weight:600;margin-bottom:1rem">' + esc(msg) + '</p>' +
    (linkHref ? '<a class="btn btn-primary" href="' + esc(linkHref) + '" target="_top">' + esc(linkLabel) + '</a>' : '<button class="btn btn-ghost" onclick="closeXr()">Fechar</button>') + '</div>';
}

var SEN_LABELS = { estagio:'Estágio', junior:'Júnior', pleno:'Pleno', senior:'Sênior', especialista:'Especialista', lideranca:'Liderança' };

function renderXr(cv, p) {
  var modal = document.getElementById('xrModal');
  var box = document.getElementById('xrContent');
  modal.classList.add('open');
  function chips(arr, cls) {
    return '<div class="chips">' + (arr || []).map(function(x){ return '<span class="chip ' + (cls || '') + '">' + esc(x) + '</span>'; }).join('') + '</div>';
  }
  function list(arr, cls) {
    return '<ul class="xr-list ' + (cls || '') + '">' + (arr || []).map(function(x){ return '<li>' + esc(x) + '</li>'; }).join('') + '</ul>';
  }
  var m = p.mercado || {};
  box.innerHTML =
    '<div class="xr-title">Raio-X do perfil</div>' +
    '<div class="xr-sub">' + esc(cv.name || 'Currículo') + (cv.profile_analysis_at ? ' · gerado em ' + fmtDate(cv.profile_analysis_at) : '') + '</div>' +
    '<div class="xr-sec"><p>' + esc(p.resumo_perfil || '') + '</p></div>' +
    '<div class="xr-sec"><h3>Senioridade</h3><span class="xr-badge-sen">' + esc(SEN_LABELS[p.senioridade] || p.senioridade || '—') + '</span>' +
    ((p.areas_atuacao || []).length ? '<div style="margin-top:.6rem">' + chips(p.areas_atuacao, 'gr') + '</div>' : '') + '</div>' +
    '<div class="xr-sec"><h3>Competências técnicas</h3>' + chips(p.competencias_tecnicas) + '</div>' +
    ((p.competencias_comportamentais || []).length ? '<div class="xr-sec"><h3>Competências comportamentais</h3>' + chips(p.competencias_comportamentais) + '</div>' : '') +
    '<div class="xr-grid2">' +
    '<div class="xr-sec"><h3>Pontos fortes</h3>' + list(p.pontos_fortes) + '</div>' +
    '<div class="xr-sec"><h3>Pontos a desenvolver</h3>' + list(p.lacunas, 'gaps') + '</div>' +
    '</div>' +
    '<div class="xr-sec"><h3>Seu posicionamento no mercado</h3><p>' + esc(m.posicionamento || '') + '</p>' +
    ((m.cargos_alvo || []).length ? '<div style="margin-top:.6rem"><h3 style="margin-top:.8rem">Cargos que você pode disputar</h3>' + chips(m.cargos_alvo, 'gr') + '</div>' : '') + '</div>' +
    ((m.recomendacoes || []).length ? '<div class="xr-sec"><h3>Recomendações práticas</h3>' + list(m.recomendacoes) + '</div>' : '') +
    '<div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1.4rem">' +
    '<button class="btn btn-ghost" onclick="closeXr()">Fechar</button>' +
    '<button class="btn btn-ghost" onclick="regenXr(\'' + esc(cv.id || '') + '\')">Refazer análise (1 crédito)</button>' +
    '</div>';
}

function regenXr(id) {
  if (!id) return;
  if (!confirm('Refazer o Raio-X consome 1 crédito. Continuar?')) return;
  generateXr(id);
}

function closeXr() {
  document.getElementById('xrModal').classList.remove('open');
}
</script>
</body>
</html>
