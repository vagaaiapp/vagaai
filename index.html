<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VagaAI</title>
<style>
body { margin: 0; padding: 20px; background: #080808; color: #f0ece4; font-family: Arial, sans-serif; line-height: 1.6; }
nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(8,8,8,0.95); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.nav-logo { color: #3ecf8e; font-size: 20px; font-weight: bold; text-decoration: none; }
.nav-links { display: flex; gap: 2rem; }
.nav-links a { color: #f0ece4; text-decoration: none; }
.nav-links a:hover { color: #3ecf8e; }
.btn { background: #3ecf8e; color: #080808; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn:hover { opacity: 0.88; }
.container { max-width: 1100px; margin: 0 auto; }
.hero { min-height: 100vh; display: flex; align-items: center; padding-top: 60px; }
.hero-content { max-width: 600px; }
.hero h1 { font-size: 56px; margin: 0 0 20px 0; line-height: 1.2; }
.hero h1 em { color: #3ecf8e; font-style: italic; }
.hero p { font-size: 16px; color: rgba(240,236,228,0.7); margin-bottom: 30px; }
.cta-buttons { display: flex; gap: 15px; }
.btn-primary { background: #3ecf8e; }
.btn-secondary { background: transparent; border: 1px solid rgba(240,236,228,0.3); color: #f0ece4; }
footer { background: #111111; padding: 3rem 2rem; text-align: center; color: rgba(240,236,228,0.5); margin-top: 4rem; }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">V VagaAI</a>
  <div class="nav-links">
    <a href="#recursos">Recursos</a>
    <a href="#pricing">Planos</a>
  </div>
  <div>
    <button class="btn">Começar grátis →</button>
  </div>
</nav>

<div class="container">
  <section class="hero">
    <div class="hero-content">
      <h1>Passe pelo <em>filtro.</em><br>Chegue mais forte na entrevista.</h1>
      <p>Cole a vaga e seu currículo. O VagaAI mostra onde você está perdendo pontos, otimiza seu CV para ATS e prepara você para a entrevista.</p>
      <div class="cta-buttons">
        <button class="btn btn-primary">⚡ Analisar minha vaga grátis</button>
        <button class="btn btn-secondary">Ver como funciona →</button>
      </div>
    </div>
  </section>
</div>

<footer>
  <p>© 2025 VagaAI · Todos os direitos reservados</p>
</footer>

</body>
</html>
