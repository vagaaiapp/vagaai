<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — VagaAI</title>
<meta name="description" content="Dicas de carreira, como otimizar currículo para ATS, estratégias para conseguir emprego e muito mais.">
<link rel="canonical" href="https://www.vagaai.app.br/blog">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script defer src="/_vercel/insights/script.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f0d;--surface:#111814;--surface2:#161d19;--border:rgba(255,255,255,0.07);--text:#e8ede9;--muted:#8a9e90;--green:#3ecf8e;--green-dim:rgba(62,207,142,0.12);--green-border:rgba(62,207,142,0.25)}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:rgba(10,15,13,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 1.5rem;height:58px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-badge{font-size:9px;background:var(--green-dim);border:1px solid var(--green-border);color:var(--green);padding:1px 7px;border-radius:20px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.nav-cta{font-size:13px;font-weight:700;background:var(--green);color:#0a0f0d;padding:.4rem .9rem;border-radius:8px;text-decoration:none;transition:background .2s}
.nav-cta:hover{background:#4ddb9e}
.container{max-width:860px;margin:0 auto;padding:3rem 1.5rem 5rem}
.blog-header{text-align:center;margin-bottom:3rem}
.blog-header h1{font-family:'Lora',serif;font-size:clamp(26px,5vw,40px);font-weight:700;margin-bottom:.5rem}
.blog-header p{color:var(--muted);font-size:15px}
.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem}
@media(max-width:600px){.posts-grid{grid-template-columns:1fr}}
.post-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;text-decoration:none;color:var(--text);transition:border-color .2s,transform .2s;display:flex;flex-direction:column}
.post-card:hover{border-color:var(--green-border);transform:translateY(-2px)}
.post-card-cover{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--surface2);display:block}
.post-card-cover-placeholder{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,var(--surface2),rgba(62,207,142,0.05));display:flex;align-items:center;justify-content:center;font-size:2rem}
.post-card-body{padding:1.2rem;flex:1;display:flex;flex-direction:column;gap:.5rem}
.post-card-title{font-family:'Lora',serif;font-size:17px;font-weight:700;line-height:1.3;color:var(--text)}
.post-card-excerpt{font-size:13px;color:var(--muted);line-height:1.55;flex:1}
.post-card-date{font-size:11px;color:var(--muted);margin-top:.3rem}
.empty-state{text-align:center;padding:5rem 2rem;color:var(--muted)}
.empty-state h2{font-family:'Lora',serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:.5rem}
.empty-state p{font-size:14px;margin-bottom:1.5rem}
.empty-cta{display:inline-block;background:var(--green);color:#0a0f0d;font-weight:700;font-size:14px;padding:.75rem 1.5rem;border-radius:9px;text-decoration:none}
.loading{text-align:center;padding:4rem;color:var(--muted);font-size:14px}
footer{text-align:center;padding:2rem;font-size:13px;color:var(--muted);border-top:1px solid var(--border)}
footer a{color:var(--green);text-decoration:none}
[data-theme="light"]{--bg:#f2f6f3;--surface:#fff;--surface2:#eaf0ec;--border:rgba(0,0,0,.09);--text:#0d1a11;--muted:#4d6e57;--green:#1a8f5c;--green-dim:rgba(26,143,92,.1);--green-border:rgba(26,143,92,.25)}
[data-theme="light"] nav{background:rgba(242,246,243,0.95)!important}
</style>
<script>if(localStorage.getItem('vagaai_theme')==='light')document.documentElement.setAttribute('data-theme','light')</script>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <img src="/logo.svg" alt="VagaAI" height="38" style="display:block;">
    <span class="nav-badge">Blog</span>
  </a>
  <a href="/app" class="nav-cta">Analisar minha vaga →</a>
</nav>

<div class="container">
  <div class="blog-header">
    <h1>Blog VagaAI</h1>
    <p>Dicas para se destacar em processos seletivos, otimizar currículo e passar pelo ATS.</p>
  </div>
  <div id="postsContainer" class="loading">Carregando posts...</div>
</div>

<footer>© 2026 VagaAI · <a href="/">Início</a> · <a href="/termos">Termos</a></footer>

<script>
var SUPABASE_URL = 'https://kbcjchjepgejdezeuwwh.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtiY2pjaGplcGdlamRlemV1d3doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzA4OTcsImV4cCI6MjA5MjM0Njg5N30.k2julxPkEm4kgtw5dBy6S8hlSrVBqebe-A_GfzcW2HA';

(async function() {
  var container = document.getElementById('postsContainer');
  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/blog_posts?published=eq.true&select=title,slug,excerpt,cover_url,created_at&order=created_at.desc',
      { headers: { apikey: SUPABASE_ANON } });
    var posts = await res.json();
    if (!posts.length) {
      container.className = '';
      container.innerHTML = '<div class="empty-state"><h2>Em breve</h2><p>Estamos preparando conteúdo. Volte em breve!</p><a href="/app" class="empty-cta">Analisar minha vaga agora →</a></div>';
      return;
    }
    container.className = 'posts-grid';
    container.innerHTML = posts.map(function(p) {
      var date = new Date(p.created_at).toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
      var cover = p.cover_url ? '<img class="post-card-cover" src="' + esc(p.cover_url) + '" alt="' + esc(p.title) + '" loading="lazy">' : '<div class="post-card-cover-placeholder">✍️</div>';
      return '<a class="post-card" href="/blog/post?s=' + encodeURIComponent(p.slug) + '">'
        + cover
        + '<div class="post-card-body">'
        + '<div class="post-card-title">' + esc(p.title) + '</div>'
        + (p.excerpt ? '<div class="post-card-excerpt">' + esc(p.excerpt) + '</div>' : '')
        + '<div class="post-card-date">' + date + '</div>'
        + '</div></a>';
    }).join('');
  } catch(e) {
    container.innerHTML = '<div class="empty-state"><p>Erro ao carregar posts.</p></div>';
  }
})();

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
