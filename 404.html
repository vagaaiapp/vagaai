<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada — VagaAI</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f0d;--surface:#111814;--border:rgba(255,255,255,0.07);--text:#e8ede9;--muted:#8a9e90;--green:#3ecf8e;--green-dim:rgba(62,207,142,0.12);--green-border:rgba(62,207,142,0.25)}
[data-theme="light"]{--bg:#f2f6f3;--surface:#ffffff;--border:rgba(0,0,0,0.09);--text:#0d1a11;--muted:#4d6e57;--green:#1a8f5c;--green-dim:rgba(26,143,92,0.1);--green-border:rgba(26,143,92,0.25)}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
.code{font-family:'Lora',serif;font-size:clamp(64px,14vw,110px);font-weight:700;color:var(--green);line-height:1;margin-bottom:.4rem}
.title{font-family:'Lora',serif;font-size:clamp(20px,4vw,26px);font-weight:700;margin-bottom:.6rem}
.sub{font-size:15px;color:var(--muted);max-width:380px;margin:0 auto 2rem}
.actions{display:flex;flex-direction:column;gap:.6rem;width:100%;max-width:320px}
.btn{display:block;background:var(--green);color:#0a0f0d;font-size:15px;font-weight:700;border-radius:10px;padding:1rem;text-decoration:none;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn-ghost{display:block;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:14px;font-weight:600;border-radius:10px;padding:.8rem;text-decoration:none;transition:all .2s}
.btn-ghost:hover{border-color:var(--green-border);color:var(--green)}
.logo{margin-bottom:2.2rem}
</style>
<script>if(localStorage.getItem('vagaai_theme')==='light')document.documentElement.setAttribute('data-theme','light')</script>
</head>
<body>
<a href="/" class="logo"><img src="/logo.svg" alt="VagaAI" height="40"></a>
<div class="code">404</div>
<div class="title">Essa página não existe</div>
<p class="sub">O endereço pode ter mudado ou nunca existiu. Sua conta e suas análises continuam no lugar de sempre.</p>
<div class="actions">
  <a class="btn" href="/app">⚡ Analisar uma vaga</a>
  <a class="btn-ghost" href="/dashboard">Ir para o painel</a>
  <a class="btn-ghost" href="/">Voltar ao início</a>
</div>
</body>
</html>
