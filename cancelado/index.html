<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VagaAI — Compra cancelada</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script defer src="/_vercel/insights/script.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f0d;--surface:#111814;--border:rgba(255,255,255,0.07);--text:#e8ede9;--muted:#8a9e90;--green:#3ecf8e;--green-dim:rgba(62,207,142,0.12);--green-border:rgba(62,207,142,0.25);--yellow:#ffd166;--yellow-dim:rgba(255,209,102,0.1);--yellow-border:rgba(255,209,102,0.25)}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
nav{position:fixed;top:0;left:0;right:0;background:rgba(10,15,13,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 1.5rem;height:58px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-badge{font-size:9px;background:var(--green-dim);border:1px solid var(--green-border);color:var(--green);padding:1px 7px;border-radius:20px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.card{background:var(--surface);border:1px solid var(--yellow-border);border-radius:20px;padding:3rem 2.5rem;max-width:480px;width:100%;margin-top:58px}
.icon{font-size:52px;margin-bottom:1.2rem}
.title{font-family:'Lora',serif;font-size:clamp(22px,4vw,30px);font-weight:700;margin-bottom:.6rem;color:var(--yellow)}
.sub{font-size:15px;color:var(--muted);max-width:360px;margin:0 auto 2rem;line-height:1.6}
.notice{background:var(--yellow-dim);border:1px solid var(--yellow-border);border-radius:10px;padding:.85rem 1.1rem;font-size:13px;color:var(--yellow);margin-bottom:1.8rem;text-align:left}
.btn{display:inline-block;width:100%;background:var(--green);color:#0a0f0d;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:10px;padding:1rem;cursor:pointer;transition:all .2s;text-decoration:none;text-align:center}
.btn:hover{background:#4ddb9e}
.btn-ghost{display:inline-block;width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;border-radius:10px;padding:.8rem;cursor:pointer;transition:all .2s;text-decoration:none;text-align:center;margin-top:.6rem}
.btn-ghost:hover{border-color:var(--green-border);color:var(--green)}
.theme-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:15px;display:inline-flex;align-items:center;justify-content:center;transition:all .2s;padding:0;line-height:1}
.theme-btn:hover{border-color:var(--green-border);color:var(--green)}
[data-theme="light"]{--bg:#f2f6f3;--surface:#ffffff;--border:rgba(0,0,0,0.09);--text:#0d1a11;--muted:#4d6e57;--green:#1a8f5c;--green-dim:rgba(26,143,92,0.1);--green-border:rgba(26,143,92,0.25);--yellow:#b07d1a;--yellow-dim:rgba(176,125,26,0.08);--yellow-border:rgba(176,125,26,0.25)}
[data-theme="light"] nav{background:rgba(242,246,243,0.95)!important}
.logo-light{display:none}
[data-theme="light"] .logo-dark{display:none!important}
[data-theme="light"] .logo-light{display:block!important}
</style>
<script>if(localStorage.getItem('vagaai_theme')==='light')document.documentElement.setAttribute('data-theme','light')</script>
</head>
<body>

<nav style="display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem">
  <a href="/" class="nav-logo">
    <img src="/logo.svg" alt="VagaAI" height="38" class="logo-dark" style="display:block;">
    <img src="/logo-icon.svg" alt="VagaAI" height="38" class="logo-light" style="display:none;">
  </a>
  <button class="theme-btn" onclick="toggleTheme()" title="Alternar tema">☀️</button>
</nav>

<div class="card">
  <div class="icon">↩️</div>
  <div class="title">Compra cancelada</div>
  <p class="sub">Tudo bem — você não foi cobrado. Seus dados estão seguros e você pode tentar novamente quando quiser.</p>

  <div class="notice">
    Nenhum valor foi debitado do seu cartão.
  </div>

  <a href="/app" class="btn">⚡ Continuar analisando grátis</a>
  <a href="/dashboard" class="btn-ghost">→ Ir para o painel</a>
</div>

<script>
try { window.va && window.va('event', { name: 'purchase_cancelled' }); } catch(e) {}
function toggleTheme(){
  var l = document.documentElement.getAttribute('data-theme') === 'light';
  if (l) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('vagaai_theme','dark'); }
  else { document.documentElement.setAttribute('data-theme','light'); localStorage.setItem('vagaai_theme','light'); }
}
</script>
</body>
</html>
