<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#0d1a11"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#3ecf8e;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#3ecf8e;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#center-glow)"/>

  <!-- Top green accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="#3ecf8e" opacity="0.7"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Score card — left side -->
  <rect x="72" y="148" width="330" height="334" rx="20" fill="#111814" stroke="rgba(62,207,142,0.22)" stroke-width="1"/>

  <!-- Ring -->
  <circle cx="237" cy="268" r="74" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="11"/>
  <circle cx="237" cy="268" r="74" fill="none" stroke="#3ecf8e" stroke-width="11"
    stroke-dasharray="465" stroke-dashoffset="116"
    stroke-linecap="round"
    transform="rotate(-90 237 268)"/>
  <text x="237" y="260" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="38" font-weight="700" fill="#e8ede9">75</text>
  <text x="237" y="284" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" fill="#8a9e90">/ 100</text>
  <text x="237" y="314" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" fill="#8a9e90" letter-spacing="0.8">COMPATIBILIDADE ATS</text>

  <!-- Divider -->
  <rect x="100" y="346" width="234" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Mini bars -->
  <text x="100" y="368" font-family="Inter,Arial,sans-serif" font-size="11" fill="#8a9e90">Keywords ATS</text>
  <text x="334" y="368" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#3ecf8e">71%</text>
  <rect x="100" y="374" width="234" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="100" y="374" width="166" height="6" rx="3" fill="#3ecf8e" opacity="0.75"/>

  <text x="100" y="398" font-family="Inter,Arial,sans-serif" font-size="11" fill="#8a9e90">Compatibilidade</text>
  <text x="334" y="398" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#3ecf8e">82%</text>
  <rect x="100" y="404" width="234" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="100" y="404" width="192" height="6" rx="3" fill="#3ecf8e" opacity="0.75"/>

  <text x="100" y="428" font-family="Inter,Arial,sans-serif" font-size="11" fill="#8a9e90">Legibilidade</text>
  <text x="334" y="428" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#3ecf8e">90%</text>
  <rect x="100" y="434" width="234" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="100" y="434" width="211" height="6" rx="3" fill="#3ecf8e" opacity="0.75"/>

  <!-- Tag -->
  <rect x="100" y="456" width="234" height="1" fill="rgba(255,255,255,0.06)"/>
  <rect x="100" y="466" width="140" height="22" rx="11" fill="rgba(62,207,142,0.12)" stroke="rgba(62,207,142,0.25)" stroke-width="1"/>
  <text x="170" y="481" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" fill="#3ecf8e">✓ CV otimizado</text>

  <!-- Right side content -->
  <!-- Brand label -->
  <text x="462" y="205" font-family="Georgia,serif" font-size="20" font-style="italic" fill="#3ecf8e">VagaAI</text>

  <!-- Main headline -->
  <text x="462" y="278" font-family="Georgia,serif" font-size="62" font-weight="700" fill="#f0ece4">Passe pelo</text>
  <text x="462" y="352" font-family="Georgia,serif" font-size="62" font-weight="700" font-style="italic" fill="#3ecf8e">filtro.</text>
  <text x="462" y="416" font-family="Georgia,serif" font-size="46" font-weight="700" fill="#f0ece4">Chegue mais forte</text>
  <text x="462" y="468" font-family="Georgia,serif" font-size="46" font-weight="700" fill="#f0ece4">na entrevista.</text>

  <!-- Sub -->
  <text x="462" y="514" font-family="Inter,Arial,sans-serif" font-size="17" fill="rgba(240,236,228,0.4)">Análise ATS + briefing em segundos. 1 análise grátis.</text>

  <!-- CTA pill -->
  <rect x="462" y="536" width="248" height="44" rx="22" fill="#3ecf8e"/>
  <text x="586" y="563" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#080808">⚡ Grátis, sem cadastro</text>

  <!-- Domain watermark -->
  <text x="1128" y="606" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="13" fill="rgba(240,236,228,0.2)">vagaai.app.br</text>
</svg>
