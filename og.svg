<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f0d"/>
      <stop offset="100%" stop-color="#0d1a12"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3ecf8e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3ecf8e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top green glow -->
  <ellipse cx="600" cy="-60" rx="700" ry="220" fill="url(#glow)"/>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="rgba(62,207,142,0.15)" stroke-width="2" rx="0"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Badge -->
  <rect x="80" y="80" width="100" height="28" rx="14" fill="rgba(62,207,142,0.12)" stroke="rgba(62,207,142,0.3)" stroke-width="1"/>
  <text x="130" y="99" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#3ecf8e" text-anchor="middle" letter-spacing="1">BETA</text>

  <!-- Logo -->
  <text x="80" y="200" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#e8ede9" letter-spacing="-2">Vaga<tspan fill="#3ecf8e">AI</tspan></text>

  <!-- Headline -->
  <text x="80" y="292" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#e8ede9" letter-spacing="-1">Passe pelo filtro.</text>
  <text x="80" y="346" font-family="Georgia, serif" font-size="42" font-weight="400" font-style="italic" fill="#3ecf8e" letter-spacing="-1">Chegue mais forte na entrevista.</text>

  <!-- Sub -->
  <text x="80" y="410" font-family="system-ui, sans-serif" font-size="22" fill="#8a9e90">Análise ATS + briefing da empresa em segundos.</text>

  <!-- Divider -->
  <line x1="80" y1="450" x2="480" y2="450" stroke="rgba(62,207,142,0.3)" stroke-width="1"/>

  <!-- Trust items -->
  <circle cx="92" cy="490" r="4" fill="#3ecf8e"/>
  <text x="106" y="495" font-family="system-ui, sans-serif" font-size="18" fill="#8a9e90">1 análise grátis</text>

  <circle cx="252" cy="490" r="4" fill="#3ecf8e"/>
  <text x="266" y="495" font-family="system-ui, sans-serif" font-size="18" fill="#8a9e90">Sem cadastro</text>

  <circle cx="392" cy="490" r="4" fill="#3ecf8e"/>
  <text x="406" y="495" font-family="system-ui, sans-serif" font-size="18" fill="#8a9e90">Resultado em segundos</text>

  <!-- Right side: mock card -->
  <rect x="740" y="120" width="380" height="400" rx="16" fill="rgba(17,24,20,0.9)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Card header dots -->
  <circle cx="768" cy="152" r="6" fill="rgba(255,255,255,0.15)"/>
  <circle cx="788" cy="152" r="6" fill="rgba(255,255,255,0.15)"/>
  <circle cx="808" cy="152" r="6" fill="rgba(255,255,255,0.15)"/>
  <text x="930" y="157" font-family="system-ui, sans-serif" font-size="13" fill="#8a9e90" text-anchor="middle">Análise VagaAI</text>

  <!-- Score ring -->
  <circle cx="930" cy="270" r="70" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
  <circle cx="930" cy="270" r="70" fill="none" stroke="#3ecf8e" stroke-width="10"
    stroke-dasharray="440" stroke-dashoffset="110" stroke-linecap="round"
    transform="rotate(-90 930 270)"/>
  <text x="930" y="262" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#e8ede9" text-anchor="middle">75</text>
  <text x="930" y="282" font-family="system-ui, sans-serif" font-size="12" fill="#8a9e90" text-anchor="middle">/ 100</text>
  <text x="930" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#3ecf8e" text-anchor="middle" letter-spacing="1">COMPATIBILIDADE</text>

  <!-- Factor bars -->
  <text x="768" y="375" font-family="system-ui, sans-serif" font-size="12" fill="#8a9e90">Keywords ATS</text>
  <rect x="768" y="382" width="200" height="5" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="768" y="382" width="142" height="5" rx="3" fill="#3ecf8e"/>
  <text x="978" y="387" font-family="system-ui, sans-serif" font-size="12" fill="#e8ede9" text-anchor="end">71%</text>

  <text x="768" y="408" font-family="system-ui, sans-serif" font-size="12" fill="#8a9e90">Legibilidade</text>
  <rect x="768" y="415" width="200" height="5" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="768" y="415" width="180" height="5" rx="3" fill="#3ecf8e"/>
  <text x="978" y="420" font-family="system-ui, sans-serif" font-size="12" fill="#e8ede9" text-anchor="end">90%</text>

  <text x="768" y="441" font-family="system-ui, sans-serif" font-size="12" fill="#8a9e90">Força dos bullets</text>
  <rect x="768" y="448" width="200" height="5" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="768" y="448" width="120" height="5" rx="3" fill="#ffd166"/>
  <text x="978" y="453" font-family="system-ui, sans-serif" font-size="12" fill="#e8ede9" text-anchor="end">60%</text>

  <!-- URL -->
  <text x="600" y="590" font-family="system-ui, sans-serif" font-size="16" fill="rgba(138,158,144,0.6)" text-anchor="middle">vagaai.app.br</text>
</svg>
