<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currículo Otimizado</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}

/* ── Themes ─────────────────────────────────────────────── */
:root{
  --sb-bg:#2d3436;
  --sb-text:#f0f0f0;
  --sb-muted:rgba(240,240,240,.55);
  --sb-border:rgba(255,255,255,.1);
  --accent:#7f8c8d;
  --accent-solid:#636e72;
  --page-bg:#e8e8e8;
}
[data-theme="green"]{
  --sb-bg:#1b3a2d;
  --sb-text:#e6f4ed;
  --sb-muted:rgba(230,244,237,.55);
  --sb-border:rgba(62,207,142,.18);
  --accent:#3ecf8e;
  --accent-solid:#2eaf74;
}
[data-theme="navy"]{
  --sb-bg:#1a2a48;
  --sb-text:#e6edf8;
  --sb-muted:rgba(230,237,248,.55);
  --sb-border:rgba(100,160,230,.18);
  --accent:#5b9bd5;
  --accent-solid:#4a8ac4;
}

/* ── Toolbar (hidden on print) ──────────────────────────── */
.toolbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:#111;padding:.6rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:.8rem;
  font-family:'Inter',sans-serif;
}
.toolbar-left{display:flex;align-items:center;gap:1rem}
.toolbar-logo{font-size:12px;font-weight:700;color:#fff;opacity:.55}
.toolbar-tip{font-size:11px;color:rgba(255,255,255,.3)}
.toolbar-right{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap}

/* Buttons */
.btn-print{background:#3ecf8e;color:#0a0f0d;border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;padding:.42rem .95rem;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:.35rem;transition:opacity .15s}
.btn-print:hover{opacity:.85}
.btn-secondary{background:transparent;color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.15);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:.38rem .8rem;border-radius:7px;cursor:pointer;text-decoration:none;transition:all .15s;display:flex;align-items:center;gap:.3rem}
.btn-secondary:hover{color:#fff;border-color:rgba(255,255,255,.3)}

/* Theme picker */
.theme-wrap{display:flex;align-items:center;gap:.5rem}
.theme-label{font-size:11px;color:rgba(255,255,255,.38)}
.theme-dots{display:flex;gap:.35rem}
.tdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.tdot:hover{transform:scale(1.2)}
.tdot.active{border-color:#fff!important}
.tdot-graphite{background:#2d3436}
.tdot-green{background:#3ecf8e}
.tdot-navy{background:#5b9bd5}

#photoFileInput{display:none}

/* ── Page body ───────────────────────────────────────────── */
body{background:var(--page-bg);font-family:'Inter',sans-serif;padding-top:50px;padding-bottom:3rem}

/* ── A4 ─────────────────────────────────────────────────── */
.page{
  width:210mm;min-height:297mm;
  background:#fff;
  margin:1.6rem auto;
  box-shadow:0 6px 40px rgba(0,0,0,.22);
  display:flex;
  overflow:hidden;
  position:relative;
}

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar{
  width:68mm;flex-shrink:0;
  background:var(--sb-bg);
  color:var(--sb-text);
  padding:14mm 10mm 12mm;
  display:flex;flex-direction:column;gap:1.3rem;
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
}

/* Photo */
.sb-photo-wrap{display:flex;justify-content:center;margin-bottom:.2rem}
.sb-photo{
  width:82px;height:82px;border-radius:50%;
  background:rgba(255,255,255,.08);
  border:2.5px solid var(--accent);
  overflow:hidden;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  position:relative;flex-shrink:0;
  -webkit-print-color-adjust:exact;print-color-adjust:exact;
}
.sb-photo:hover .sb-photo-hover{opacity:1}
.sb-photo img{width:100%;height:100%;object-fit:cover;display:none}
.sb-photo-icon{font-size:30px;line-height:1;color:rgba(255,255,255,.35);pointer-events:none}
.sb-photo-hover{position:absolute;inset:0;background:rgba(0,0,0,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:11px;color:#fff;font-weight:600;text-align:center;padding:.4rem;pointer-events:none}

/* Sidebar name/title */
.sb-name{font-size:15px;font-weight:700;color:var(--sb-text);text-align:center;line-height:1.25;letter-spacing:-.01em;margin-top:.55rem}
.sb-role{font-size:8.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);text-align:center;margin-top:.3rem;line-height:1.4}

/* Section in sidebar */
.sb-sec{border-top:1px solid var(--sb-border);padding-top:1rem}
.sb-sec-title{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:.6rem}

/* Contact */
.sb-contact{list-style:none;display:flex;flex-direction:column;gap:.42rem}
.sb-contact li{font-size:9px;color:var(--sb-muted);display:flex;align-items:flex-start;gap:.4rem;line-height:1.45}
.sb-contact li a{color:var(--sb-muted);text-decoration:none;word-break:break-all}
.sb-icon{flex-shrink:0;font-size:9px;margin-top:.1rem;width:11px;text-align:center}

/* Skills tags */
.sb-tags{display:flex;flex-wrap:wrap;gap:.28rem}
.sb-tag{font-size:8px;color:var(--sb-text);background:rgba(255,255,255,.1);border-radius:3px;padding:.17rem .42rem;-webkit-print-color-adjust:exact;print-color-adjust:exact;line-height:1.4}

/* Education in sidebar */
.sb-edu-list{display:flex;flex-direction:column;gap:.7rem}
.sb-edu-curso{font-size:9.5px;font-weight:600;color:var(--sb-text);line-height:1.3}
.sb-edu-inst{font-size:8.5px;color:var(--sb-muted);line-height:1.3}
.sb-edu-periodo{font-size:8px;color:var(--accent);margin-top:.12rem}

/* ── Main content ───────────────────────────────────────── */
.content{
  flex:1;min-width:0;
  padding:13mm 12mm 12mm 11mm;
  display:flex;flex-direction:column;gap:1rem;
}

/* Content header (name only — sidebar has photo) */
.cv-header{border-bottom:2.5px solid var(--sb-bg);padding-bottom:.8rem;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.cv-name{font-family:'Lora',serif;font-size:21px;font-weight:700;color:#111;letter-spacing:-.02em;line-height:1.2}
.cv-role{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--accent-solid);margin-top:.3rem}

/* Content sections */
.cv-sec{page-break-inside:avoid}
.cv-sec-title{
  font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--sb-bg);border-bottom:1.5px solid var(--sb-bg);
  padding-bottom:.22rem;margin-bottom:.65rem;
  -webkit-print-color-adjust:exact;print-color-adjust:exact;
}
.cv-resumo{font-size:10px;color:#444;line-height:1.7}

/* Experience */
.exp-item{margin-bottom:.9rem;page-break-inside:avoid}
.exp-item:last-child{margin-bottom:0}
.exp-header{display:flex;justify-content:space-between;align-items:baseline;gap:.5rem}
.exp-cargo{font-size:11px;font-weight:700;color:#111}
.exp-periodo{font-size:9px;color:#999;white-space:nowrap;flex-shrink:0;font-weight:500}
.exp-empresa{font-size:9.5px;font-weight:600;color:var(--accent-solid);margin:.1rem 0 .3rem}
.exp-bullets{list-style:none;display:flex;flex-direction:column;gap:.22rem}
.exp-bullets li{font-size:10px;color:#444;line-height:1.55;padding-left:.9rem;position:relative}
.exp-bullets li::before{content:'▸';position:absolute;left:0;color:var(--accent-solid);font-size:8px;top:.28rem;-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* ── No data ─────────────────────────────────────────────── */
.no-data{text-align:center;padding:5rem 2rem;font-family:'Inter',sans-serif;color:#555;width:100%}
.no-data h2{font-size:20px;margin-bottom:.5rem;color:#111}
.no-data p{font-size:13px;margin-bottom:1.5rem}
.no-data a{display:inline-block;background:#3ecf8e;color:#0a0f0d;font-weight:700;font-size:13px;padding:.65rem 1.3rem;border-radius:8px;text-decoration:none}

/* ── Print ───────────────────────────────────────────────── */
@media print{
  body{background:#fff!important;padding:0}
  .toolbar{display:none!important}
  .page{margin:0;box-shadow:none;width:100%;min-height:auto}
  .sb-photo-hover{display:none!important}
  @page{size:A4;margin:0}
}
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar" id="toolbar">
  <div class="toolbar-left">
    <span class="toolbar-logo">VagaAI</span>
    <span class="toolbar-tip">Adicione sua foto · escolha um tema · imprima como PDF</span>
  </div>
  <div class="toolbar-right">
    <div class="theme-wrap">
      <span class="theme-label">Tema:</span>
      <div class="theme-dots">
        <div class="tdot tdot-graphite active" id="dot-graphite" onclick="setTheme('graphite')" title="Grafite"></div>
        <div class="tdot tdot-green"    id="dot-green"    onclick="setTheme('green')"    title="Verde"></div>
        <div class="tdot tdot-navy"     id="dot-navy"     onclick="setTheme('navy')"     title="Azul marinho"></div>
      </div>
    </div>
    <button class="btn-secondary" onclick="document.getElementById('photoFileInput').click()">📷 Foto</button>
    <input type="file" id="photoFileInput" accept="image/*">
    <a href="/app" class="btn-secondary">← Voltar</a>
    <button class="btn-print" onclick="window.print()">🖨️ Imprimir / PDF</button>
  </div>
</div>

<!-- A4 Page -->
<div class="page" id="cvPage">

  <!-- No data -->
  <div class="no-data" id="noData" style="display:none">
    <h2>Nenhum currículo encontrado</h2>
    <p>Faça uma análise primeiro para gerar seu currículo otimizado.</p>
    <a href="/app">Analisar minha vaga →</a>
  </div>

  <!-- ── Sidebar ── -->
  <div class="sidebar" id="cvSidebar" style="display:none">

    <!-- Photo -->
    <div class="sb-photo-wrap">
      <div class="sb-photo" id="sbPhoto" onclick="document.getElementById('photoFileInput').click()" title="Clique para adicionar foto">
        <div class="sb-photo-icon" id="sbPhotoIcon">👤</div>
        <img id="sbPhotoImg" alt="Foto">
        <div class="sb-photo-hover">📷 Trocar foto</div>
      </div>
    </div>

    <!-- Name + role -->
    <div style="text-align:center;margin-top:-.3rem">
      <div class="sb-name" id="sbNome"></div>
      <div class="sb-role" id="sbRole"></div>
    </div>

    <!-- Contact -->
    <div class="sb-sec" id="sbSecContato">
      <div class="sb-sec-title">Contato</div>
      <ul class="sb-contact" id="sbContatos"></ul>
    </div>

    <!-- Skills -->
    <div class="sb-sec" id="sbSecSkills" style="display:none">
      <div class="sb-sec-title">Habilidades</div>
      <div class="sb-tags" id="sbSkills"></div>
    </div>

    <!-- Education -->
    <div class="sb-sec" id="sbSecEdu" style="display:none">
      <div class="sb-sec-title">Formação</div>
      <div class="sb-edu-list" id="sbEdu"></div>
    </div>

  </div>

  <!-- ── Main content ── -->
  <div class="content" id="cvContent" style="display:none">

    <!-- Header: name only (photo is in sidebar) -->
    <div class="cv-header">
      <div class="cv-name" id="cvNome"></div>
      <div class="cv-role" id="cvRole"></div>
    </div>

    <!-- Summary -->
    <div class="cv-sec" id="secResumo" style="display:none">
      <div class="cv-sec-title">Resumo Profissional</div>
      <div class="cv-resumo" id="cvResumo"></div>
    </div>

    <!-- Experience -->
    <div class="cv-sec" id="secExp" style="display:none">
      <div class="cv-sec-title">Experiência Profissional</div>
      <div id="cvExperiencias"></div>
    </div>

  </div>
</div><!-- /page -->

<script>
(function() {

  /* ── Load CV data ─────────────────────────────────────── */
  var raw = null;
  try { raw = localStorage.getItem('vagaai_cv'); } catch(e) {}
  if (!raw) { show('noData'); return; }
  var cv;
  try { cv = JSON.parse(raw); } catch(e) { show('noData'); return; }

  show('cvSidebar'); show('cvContent');
  if (cv.nome) document.title = cv.nome + ' — Currículo';

  /* ── Sidebar: name + role ─────────────────────────────── */
  setText('sbNome', cv.nome);
  setText('sbRole', cv.titulo_profissional);

  /* ── Content: name + role ─────────────────────────────── */
  setText('cvNome', cv.nome);
  setText('cvRole', cv.titulo_profissional);

  /* ── Contacts ─────────────────────────────────────────── */
  var c = cv.contato || {};
  var items = [];
  if (c.email)    items.push('<li><span class="sb-icon">✉</span><a href="mailto:' + esc(c.email) + '">' + esc(c.email) + '</a></li>');
  if (c.telefone) items.push('<li><span class="sb-icon">📞</span>' + esc(c.telefone) + '</li>');
  if (c.linkedin) {
    var liTxt = c.linkedin.replace(/^https?:\/\/(www\.)?linkedin\.com\//i,'linkedin.com/');
    items.push('<li><span class="sb-icon">🔗</span><a href="' + esc(c.linkedin) + '" target="_blank">' + esc(liTxt) + '</a></li>');
  }
  if (c.cidade)   items.push('<li><span class="sb-icon">📍</span>' + esc(c.cidade) + '</li>');
  document.getElementById('sbContatos').innerHTML = items.join('');

  /* ── Skills ───────────────────────────────────────────── */
  var skills = cv.habilidades;
  if (skills && skills.length) {
    show('sbSecSkills');
    document.getElementById('sbSkills').innerHTML = skills.slice(0,16).map(function(s) {
      return '<span class="sb-tag">' + esc(s) + '</span>';
    }).join('');
  }

  /* ── Education (sidebar) ──────────────────────────────── */
  var edus = cv.formacao;
  if (edus && edus.length) {
    show('sbSecEdu');
    document.getElementById('sbEdu').innerHTML = edus.map(function(e) {
      return '<div>'
        + '<div class="sb-edu-curso">' + esc(e.curso || '') + '</div>'
        + '<div class="sb-edu-inst">' + esc(e.instituicao || '') + '</div>'
        + (e.periodo ? '<div class="sb-edu-periodo">' + esc(e.periodo) + '</div>' : '')
        + '</div>';
    }).join('');
  }

  /* ── Summary ──────────────────────────────────────────── */
  if (cv.resumo_profissional) {
    show('secResumo');
    setText('cvResumo', cv.resumo_profissional);
  }

  /* ── Experience ───────────────────────────────────────── */
  var exps = cv.experiencias;
  if (exps && exps.length) {
    show('secExp');
    document.getElementById('cvExperiencias').innerHTML = exps.map(function(e) {
      var buls = (e.bullets || []).map(function(b) {
        return '<li>' + esc(b) + '</li>';
      }).join('');
      return '<div class="exp-item">'
        + '<div class="exp-header">'
          + '<span class="exp-cargo">' + esc(e.cargo || '') + '</span>'
          + '<span class="exp-periodo">' + esc(e.periodo || '') + '</span>'
        + '</div>'
        + '<div class="exp-empresa">' + esc(e.empresa || '') + '</div>'
        + (buls ? '<ul class="exp-bullets">' + buls + '</ul>' : '')
        + '</div>';
    }).join('');
  }

  /* ── Theme ────────────────────────────────────────────── */
  var t = 'graphite';
  try { t = localStorage.getItem('vagaai_cv_theme') || 'graphite'; } catch(e) {}
  applyTheme(t, false);

  /* ── Photo ────────────────────────────────────────────── */
  var savedPhoto = null;
  try { savedPhoto = localStorage.getItem('vagaai_cv_photo'); } catch(e) {}
  if (savedPhoto) renderPhoto(savedPhoto);

  document.getElementById('photoFileInput').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      renderPhoto(ev.target.result);
      try { localStorage.setItem('vagaai_cv_photo', ev.target.result); } catch(e) {}
    };
    reader.readAsDataURL(file);
    this.value = '';
  });

  function renderPhoto(src) {
    var img = document.getElementById('sbPhotoImg');
    img.src = src;
    img.style.display = 'block';
    document.getElementById('sbPhotoIcon').style.display = 'none';
  }

  /* ── Helpers ──────────────────────────────────────────── */
  function show(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = id === 'cvSidebar' ? 'flex' : id === 'cvContent' ? 'flex' : 'block';
  }
  function setText(id, val) {
    var el = document.getElementById(id);
    if (el) el.textContent = val || '';
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

})();

/* ── Theme switcher (global) ──────────────────────────────── */
function applyTheme(theme, save) {
  if (theme === 'graphite') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', theme);
  ['graphite','green','navy'].forEach(function(t) {
    var d = document.getElementById('dot-' + t);
    if (d) d.classList.toggle('active', t === theme);
  });
  if (save !== false) {
    try { localStorage.setItem('vagaai_cv_theme', theme); } catch(e) {}
  }
}
function setTheme(theme) { applyTheme(theme, true); }
</script>
</body>
</html>
