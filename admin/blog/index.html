<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VagaAI — Gerenciar Blog</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f0d;--surface:#111814;--surface2:#161d19;--border:rgba(255,255,255,0.07);
  --text:#e8ede9;--muted:#8a9e90;--green:#3ecf8e;
  --green-dim:rgba(62,207,142,0.12);--green-border:rgba(62,207,142,0.25);
  --red:#ff6b6b;--red-dim:rgba(255,107,107,0.12);--red-border:rgba(255,107,107,0.25);
  --yellow:#ffd166;--yellow-dim:rgba(255,209,102,0.12);--yellow-border:rgba(255,209,102,0.3);
}
.ic{display:inline-flex;align-items:center;vertical-align:middle;flex-shrink:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:rgba(10,15,13,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 1.5rem;height:58px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-badge{font-size:9px;background:var(--red-dim);border:1px solid var(--red-border);color:var(--red);padding:1px 7px;border-radius:20px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.nav-right{display:flex;align-items:center;gap:.75rem}
.btn-nav{font-size:13px;font-weight:600;padding:.4rem .9rem;border-radius:8px;cursor:pointer;transition:all .2s;text-decoration:none;border:none;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px}
.btn-nav.ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-nav.ghost:hover{border-color:rgba(255,255,255,.15);color:var(--text)}
.btn-nav.primary{background:var(--green);color:#0a0f0d}
.btn-nav.primary:hover{background:#4ddb9e}
.btn-nav.danger{background:var(--red-dim);border:1px solid var(--red-border);color:var(--red)}
.btn-nav.danger:hover{background:rgba(255,107,107,.2)}

.container{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 5rem}

/* VIEWS */
#listView{display:block}
#editorView{display:none}

/* LIST */
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem}
.list-title{font-family:'Lora',serif;font-size:clamp(20px,3vw,26px);font-weight:700}
.posts-grid{display:flex;flex-direction:column;gap:.75rem}
.post-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.3rem;display:flex;align-items:center;gap:1rem;transition:border-color .2s;cursor:pointer}
.post-card:hover{border-color:rgba(255,255,255,.15)}
.post-card-info{flex:1;min-width:0}
.post-card-title{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.2rem}
.post-card-meta{font-size:12px;color:var(--muted)}
.post-card-actions{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.badge{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.badge.green{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.badge.yellow{background:var(--yellow-dim);color:var(--yellow);border:1px solid var(--yellow-border)}
.btn-sm{font-size:12px;font-weight:600;padding:.35rem .75rem;border-radius:7px;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:4px}
.btn-sm:hover{border-color:var(--green-border);color:var(--green)}
.btn-sm.danger:hover{border-color:var(--red-border);color:var(--red)}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-state h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:.4rem}
.empty-state p{font-size:14px;margin-bottom:1.5rem}

/* EDITOR */
.editor-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem}
.editor-title-input{background:transparent;border:none;color:var(--text);font-family:'Lora',serif;font-size:clamp(22px,4vw,32px);font-weight:700;width:100%;outline:none;margin-bottom:1rem}
.editor-title-input::placeholder{color:var(--muted)}
.editor-meta{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:600px){.editor-meta{grid-template-columns:1fr}}
.field-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.field-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:.65rem .9rem;transition:border-color .2s}
.field-input:focus{outline:none;border-color:var(--green-border)}
.field-input::placeholder{color:var(--muted)}
textarea.field-input{resize:vertical;min-height:80px;line-height:1.5}

/* RICH TEXT EDITOR */
.editor-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1rem}
.editor-toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:2px;padding:.6rem .8rem;border-bottom:1px solid var(--border);background:var(--surface2)}
.tb-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:.3rem .45rem;border-radius:6px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;line-height:1}
.tb-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.tb-btn.active{background:var(--green-dim);color:var(--green)}
.tb-sep{width:1px;height:18px;background:var(--border);margin:0 3px}
.editor-content{min-height:320px;padding:1.2rem 1.4rem;color:var(--text);font-size:14px;line-height:1.8;outline:none;caret-color:var(--green)}
.editor-content:empty::before{content:attr(data-placeholder);color:var(--muted);pointer-events:none}
.editor-content h2{font-family:'Lora',serif;font-size:20px;font-weight:700;margin:1.2rem 0 .5rem;color:var(--text)}
.editor-content h3{font-size:16px;font-weight:700;margin:1rem 0 .4rem;color:var(--text)}
.editor-content p{margin-bottom:.8rem}
.editor-content ul,.editor-content ol{padding-left:1.4rem;margin-bottom:.8rem}
.editor-content li{margin-bottom:.25rem}
.editor-content a{color:var(--green);text-decoration:underline}
.editor-content blockquote{border-left:3px solid var(--green-border);padding-left:1rem;color:var(--muted);margin:.8rem 0;font-style:italic}
.editor-content strong{color:var(--text);font-weight:700}
.editor-content img{max-width:100%;border-radius:8px;margin:.5rem 0}
.editor-content hr{border:none;border-top:1px solid var(--border);margin:1.2rem 0}

.editor-footer{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.publish-toggle{display:flex;align-items:center;gap:.6rem;font-size:13px;color:var(--muted);cursor:pointer;user-select:none}
.toggle-switch{width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;transition:background .2s;flex-shrink:0}
.toggle-switch.on{background:var(--green)}
.toggle-switch::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s}
.toggle-switch.on::after{transform:translateX(16px)}
.editor-actions{display:flex;align-items:center;gap:.6rem}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--green);color:#0a0f0d;font-size:13px;font-weight:700;padding:.65rem 1.3rem;border-radius:8px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.char-hint{font-size:11px;color:var(--muted);margin-top:.3rem}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <img src="/logo.svg" alt="VagaAI" height="38" style="display:block;">
    <span class="nav-badge">Blog</span>
  </a>
  <div class="nav-right">
    <a href="/blog" target="_blank" class="btn-nav ghost">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Ver blog
    </a>
    <a href="/admin" class="btn-nav ghost">← Admin</a>
  </div>
</nav>

<div class="container">

  <!-- LISTA DE POSTS -->
  <div id="listView">
    <div class="list-header">
      <div class="list-title">Posts do Blog</div>
      <button class="btn-nav primary" onclick="newPost()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo post
      </button>
    </div>
    <div class="posts-grid" id="postsGrid">
      <div style="text-align:center;padding:2rem;color:var(--muted);font-size:13px">Carregando...</div>
    </div>
  </div>

  <!-- EDITOR -->
  <div id="editorView">
    <div class="editor-header">
      <button class="btn-nav ghost" onclick="backToList()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Voltar
      </button>
      <div class="editor-actions">
        <button class="btn-nav danger" id="deleteBtn" onclick="deletePost()" style="display:none">Excluir</button>
        <button class="btn-nav ghost" onclick="savePost(false)">Salvar rascunho</button>
        <button class="btn-nav primary" onclick="savePost(true)" id="publishBtn">Publicar</button>
      </div>
    </div>

    <input type="text" class="editor-title-input" id="postTitle" placeholder="Título do post...">

    <div class="editor-meta">
      <div>
        <div class="field-label">Slug (URL)</div>
        <input type="text" class="field-input" id="postSlug" placeholder="como-otimizar-curriculo-ats">
        <div class="char-hint">vagaai.app.br/blog/post?s=<span id="slugPreview">...</span></div>
      </div>
      <div>
        <div class="field-label">Imagem de capa (URL)</div>
        <input type="text" class="field-input" id="postCover" placeholder="https://...">
      </div>
    </div>

    <div style="margin-bottom:1rem">
      <div class="field-label">Resumo / Excerpt</div>
      <textarea class="field-input" id="postExcerpt" rows="2" placeholder="Descrição curta que aparece na listagem e no SEO..."></textarea>
    </div>

    <!-- RICH TEXT EDITOR -->
    <div class="editor-wrap">
      <div class="editor-toolbar">
        <button class="tb-btn" onclick="fmt('bold')" title="Negrito"><strong>B</strong></button>
        <button class="tb-btn" onclick="fmt('italic')" title="Itálico"><em>I</em></button>
        <button class="tb-btn" onclick="fmt('underline')" title="Sublinhado"><u>U</u></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="fmtBlock('h2')" title="Título H2">H2</button>
        <button class="tb-btn" onclick="fmtBlock('h3')" title="Título H3">H3</button>
        <button class="tb-btn" onclick="fmtBlock('p')" title="Parágrafo">¶</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="fmt('insertUnorderedList')" title="Lista">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button class="tb-btn" onclick="fmt('insertOrderedList')" title="Lista numerada">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
        </button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="insertLink()" title="Link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
        <button class="tb-btn" onclick="insertImage()" title="Imagem">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <button class="tb-btn" onclick="insertHR()" title="Divisor">—</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="fmt('undo')" title="Desfazer">↩</button>
        <button class="tb-btn" onclick="fmt('redo')" title="Refazer">↪</button>
      </div>
      <div class="editor-content" id="editorContent" contenteditable="true" data-placeholder="Escreva o conteúdo do post aqui..."></div>
    </div>

    <div class="editor-footer">
      <label class="publish-toggle" onclick="togglePublish()">
        <div class="toggle-switch" id="publishToggle"></div>
        <span id="publishLabel">Rascunho</span>
      </label>
      <div class="editor-actions">
        <button class="btn-nav danger" id="deleteBtn2" onclick="deletePost()" style="display:none">Excluir post</button>
        <button class="btn-nav ghost" onclick="savePost(false)">Salvar rascunho</button>
        <button class="btn-nav primary" onclick="savePost(true)" id="publishBtn2">Publicar</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL = 'https://kbcjchjepgejdezeuwwh.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtiY2pjaGplcGdlamRlemV1d3doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzA4OTcsImV4cCI6MjA5MjM0Njg5N30.k2julxPkEm4kgtw5dBy6S8hlSrVBqebe-A_GfzcW2HA';
var ADMIN_EMAILS = ['contato@vagaai.app.br', 'jvhr96@gmail.com'];
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

var _session = null;
var _currentPost = null;
var _isPublished = false;

// ── Auth ──────────────────────────────────────────────────────────────────────
(async function() {
  var { data: { session } } = await sb.auth.getSession();
  if (!session || !ADMIN_EMAILS.includes(session.user.email)) {
    window.location.href = '/dashboard';
    return;
  }
  _session = session;
  loadPosts();
})();

// ── Load posts ────────────────────────────────────────────────────────────────
async function loadPosts() {
  var grid = document.getElementById('postsGrid');
  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/blog_posts?select=id,title,slug,published,created_at,updated_at&order=created_at.desc', {
      headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + _session.access_token }
    });
    var posts = await res.json();
    if (!posts.length) {
      grid.innerHTML = '<div class="empty-state"><h3>Nenhum post ainda</h3><p>Clique em "Novo post" para começar.</p></div>';
      return;
    }
    grid.innerHTML = posts.map(function(p) {
      var date = new Date(p.updated_at || p.created_at).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
      return '<div class="post-card" onclick="editPost(\'' + p.id + '\')">'
        + '<div class="post-card-info">'
        + '<div class="post-card-title">' + esc(p.title || '(sem título)') + '</div>'
        + '<div class="post-card-meta">' + esc(p.slug || '') + ' · ' + date + '</div>'
        + '</div>'
        + '<span class="badge ' + (p.published ? 'green' : 'yellow') + '">' + (p.published ? 'Publicado' : 'Rascunho') + '</span>'
        + '<button class="btn-sm" onclick="event.stopPropagation();editPost(\'' + p.id + '\')">Editar</button>'
        + '</div>';
    }).join('');
  } catch(e) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:1rem">Erro ao carregar posts.</div>';
  }
}

// ── New post ──────────────────────────────────────────────────────────────────
function newPost() {
  _currentPost = null;
  _isPublished = false;
  document.getElementById('postTitle').value = '';
  document.getElementById('postSlug').value = '';
  document.getElementById('postExcerpt').value = '';
  document.getElementById('postCover').value = '';
  document.getElementById('editorContent').innerHTML = '';
  document.getElementById('slugPreview').textContent = '...';
  setPublishUI(false);
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('deleteBtn2').style.display = 'none';
  document.getElementById('publishBtn').textContent = 'Publicar';
  document.getElementById('publishBtn2').textContent = 'Publicar';
  showEditor();
}

// ── Edit post ─────────────────────────────────────────────────────────────────
async function editPost(id) {
  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/blog_posts?id=eq.' + id + '&select=*', {
      headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + _session.access_token }
    });
    var rows = await res.json();
    if (!rows.length) return;
    var p = rows[0];
    _currentPost = p;
    _isPublished = p.published;
    document.getElementById('postTitle').value = p.title || '';
    document.getElementById('postSlug').value = p.slug || '';
    document.getElementById('postExcerpt').value = p.excerpt || '';
    document.getElementById('postCover').value = p.cover_url || '';
    document.getElementById('editorContent').innerHTML = p.content || '';
    document.getElementById('slugPreview').textContent = p.slug || '...';
    setPublishUI(p.published);
    document.getElementById('deleteBtn').style.display = 'inline-flex';
    document.getElementById('deleteBtn2').style.display = 'inline-flex';
    document.getElementById('publishBtn').textContent = p.published ? 'Atualizar' : 'Publicar';
    document.getElementById('publishBtn2').textContent = p.published ? 'Atualizar' : 'Publicar';
    showEditor();
  } catch(e) { toast('Erro ao carregar post', true); }
}

// ── Save post ─────────────────────────────────────────────────────────────────
async function savePost(publish) {
  var title = document.getElementById('postTitle').value.trim();
  var slug = document.getElementById('postSlug').value.trim() || slugify(title);
  var excerpt = document.getElementById('postExcerpt').value.trim();
  var cover_url = document.getElementById('postCover').value.trim();
  var content = document.getElementById('editorContent').innerHTML;
  var published = publish ? true : _isPublished;

  if (!title) { toast('Adicione um título', true); return; }
  if (!slug) { toast('Adicione um slug', true); return; }

  document.getElementById('postSlug').value = slug;
  document.getElementById('slugPreview').textContent = slug;

  var body = JSON.stringify({ title, slug, excerpt, cover_url, content, published, updated_at: new Date().toISOString() });
  try {
    var method = _currentPost ? 'PATCH' : 'POST';
    var url = _currentPost
      ? SUPABASE_URL + '/rest/v1/blog_posts?id=eq.' + _currentPost.id
      : SUPABASE_URL + '/rest/v1/blog_posts';
    var res = await fetch(url, {
      method,
      headers: {
        apikey: SUPABASE_ANON,
        Authorization: 'Bearer ' + _session.access_token,
        'Content-Type': 'application/json',
        Prefer: _currentPost ? 'return=representation' : 'return=representation,resolution=merge-duplicates'
      },
      body
    });
    if (!res.ok) { var err = await res.text(); throw new Error(err); }
    var rows = await res.json();
    if (rows && rows[0]) _currentPost = rows[0];
    _isPublished = published;
    setPublishUI(published);
    document.getElementById('deleteBtn').style.display = 'inline-flex';
    document.getElementById('deleteBtn2').style.display = 'inline-flex';
    document.getElementById('publishBtn').textContent = published ? 'Atualizar' : 'Publicar';
    document.getElementById('publishBtn2').textContent = published ? 'Atualizar' : 'Publicar';
    toast(published ? '✓ Post publicado!' : '✓ Rascunho salvo');
  } catch(e) { toast('Erro ao salvar: ' + e.message, true); }
}

// ── Delete post ───────────────────────────────────────────────────────────────
async function deletePost() {
  if (!_currentPost) return;
  if (!confirm('Excluir "' + _currentPost.title + '"? Esta ação não pode ser desfeita.')) return;
  try {
    await fetch(SUPABASE_URL + '/rest/v1/blog_posts?id=eq.' + _currentPost.id, {
      method: 'DELETE',
      headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + _session.access_token }
    });
    toast('Post excluído');
    backToList();
  } catch(e) { toast('Erro ao excluir', true); }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function showEditor() {
  document.getElementById('listView').style.display = 'none';
  document.getElementById('editorView').style.display = 'block';
  document.getElementById('editorContent').focus();
}

function backToList() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('editorView').style.display = 'none';
  _currentPost = null;
  loadPosts();
}

function togglePublish() {
  _isPublished = !_isPublished;
  setPublishUI(_isPublished);
}

function setPublishUI(pub) {
  _isPublished = pub;
  var tog = document.getElementById('publishToggle');
  var lbl = document.getElementById('publishLabel');
  tog.classList.toggle('on', pub);
  lbl.textContent = pub ? 'Publicado' : 'Rascunho';
}

// ── Rich text ─────────────────────────────────────────────────────────────────
function fmt(cmd) { document.execCommand(cmd, false, null); document.getElementById('editorContent').focus(); }

function fmtBlock(tag) {
  document.getElementById('editorContent').focus();
  document.execCommand('formatBlock', false, tag);
}

function insertLink() {
  var url = prompt('URL do link:');
  if (url) { document.execCommand('createLink', false, url); }
}

function insertImage() {
  var url = prompt('URL da imagem:');
  if (url) { document.execCommand('insertHTML', false, '<img src="' + esc(url) + '" alt="">'); }
}

function insertHR() {
  document.execCommand('insertHTML', false, '<hr>');
}

// ── Slug auto-gen ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  var titleEl = document.getElementById('postTitle');
  var slugEl = document.getElementById('postSlug');
  titleEl.addEventListener('input', function() {
    if (!_currentPost) { var s = slugify(this.value); slugEl.value = s; document.getElementById('slugPreview').textContent = s || '...'; }
  });
  slugEl.addEventListener('input', function() { document.getElementById('slugPreview').textContent = this.value || '...'; });
});

function slugify(str) {
  return str.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-').replace(/-+/g,'-').substring(0,80);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, err) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = err ? 'var(--red)' : 'var(--green)';
  el.style.color = err ? '#fff' : '#0a0f0d';
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
